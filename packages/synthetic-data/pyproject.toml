[project]
name = "kra-synthetic-data"
version = "0.1.0"
description = "Synthetic data generator for the Revenue Intelligence platform."
requires-python = ">=3.11"
dependencies = [
  "Faker==25.9.2",
  "polars==1.41.2"
]

[project.optional-dependencies]
dev = [
  "pytest==8.3.3",
  "ruff==0.8.0"
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
