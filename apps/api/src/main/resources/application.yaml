spring:
  application:
    name: revenue-intelligence-api
  datasource:
    url: "${DB_URL:jdbc:postgresql://localhost:5432/kra system}"
    username: "${DB_USERNAME:postgres}"
    password: "${DB_PASSWORD}"
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      "[hibernate.format_sql]": true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api/openapi
  swagger-ui:
    path: /api/docs

app:
  analytics:
    risk-scoring-url: ${ANALYTICS_RISK_SCORING_URL:http://localhost:8000/risk-scoring/train}
  security:
    jwt-secret: ${JWT_SECRET}
    jwt-ttl-minutes: ${JWT_TTL_MINUTES:60}
    default-admin-email: ${DEFAULT_ADMIN_EMAIL}
    default-admin-password: ${DEFAULT_ADMIN_PASSWORD}
