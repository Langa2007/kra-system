spring:
  application:
    name: revenue-intelligence-api
  datasource:
    url: "${DB_URL:jdbc:postgresql://localhost:5432/kra system}"
    username: "${DB_USERNAME:postgres}"
    password: "${DB_PASSWORD:5638}"
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      "[hibernate.format_sql]": true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
