services:
  postgres:
    image: postgres:16
    container_name: kra-system-postgres
    environment:
      POSTGRES_DB: "kra system"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "5638"
    ports:
      - "5432:5432"
    volumes:
      - kra_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d 'kra system'"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  kra_postgres_data:
