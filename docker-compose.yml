services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: kra-system-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: "jdbc:postgresql://postgres:5432/${POSTGRES_DB:-kra system}"
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file}
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in your .env file}
      JWT_TTL_MINUTES: ${JWT_TTL_MINUTES:-60}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:?Set DEFAULT_ADMIN_EMAIL in your .env file}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:?Set DEFAULT_ADMIN_PASSWORD in your .env file}
      ANALYTICS_RISK_SCORING_URL: ${ANALYTICS_RISK_SCORING_URL:-http://host.docker.internal:8000/risk-scoring/train}
    ports:
      - "${SERVER_PORT:-8080}:8080"

  postgres:
    image: postgres:16
    container_name: kra-system-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kra system}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - kra_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kra-system-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - kra_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: kra-system-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-kra-local}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-kra-local-secret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - kra_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  kra_postgres_data:
  kra_redis_data:
  kra_minio_data:
